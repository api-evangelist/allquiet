aid: allquiet
url: https://raw.githubusercontent.com/api-evangelist/allquiet/refs/heads/main/apis.yml
name: All Quiet
kind: company
description: All Quiet is a lean, SRE-first incident management and on-call alerting
  platform for engineering teams. Its Public REST API (US and EU regions, API-key
  authenticated) lets teams programmatically create and manage incidents, configure
  inbound and outbound integrations, manage teams and escalation schedules, and read
  who is on call.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Incident Management
- On-Call
- Alerting
- Incident Response
- DevOps
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
