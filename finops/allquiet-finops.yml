meters:
- name: seats
  description: Per-user subscription seats billed monthly at the plan's per-user rate.
  unit: users
  aggregation: sum
  dimensions:
  - organization
  - plan
- name: plan
  description: The subscribed plan (Standard, Pro, Enterprise) that determines per-seat rate and feature access.
  unit: plan
  aggregation: max
  dimensions:
  - organization
principles:
- name: Visibility
  description: Track active seat count and plan tier against the monthly invoice from All Quiet.
- name: Allocation
  description: Map seats and teams to internal cost centers using team and label metadata exposed by the API.
- name: Optimization
  description: Right-size the plan to required features (API/Terraform require Pro+); reclaim inactive seats.
- name: Accountability
  description: Assign an owner per organization/billing account and review seat growth monthly against budget.
