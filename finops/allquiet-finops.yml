description: >-
  FinOps view of All Quiet spend. All Quiet bills on a per-user, per-month
  subscription basis (Standard $4.99, Pro $9.99) with unlimited usage of
  integrations, incidents, and communications, plus a custom-priced Enterprise
  plan. The Public REST API and Terraform provider are included with the Pro and
  Enterprise plans at no metered surcharge, so API consumption itself is not a
  separately billed meter; the primary cost driver is the number of seats.
notes: >-
  Per-seat list prices are subject to change; verify against the All Quiet
  pricing page during reconciliation.
